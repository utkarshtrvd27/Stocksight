api:
  url: "https://www.nseindia.com/api/equity-stockIndices"
  params:
    index: "NIFTY TOTAL MARKET"
  timeout: 15
  retries: 3
  retry_delay: 5

storage:
  bronze_path: "/mnt/stockdata/bronze/nse_stock_raw"
  format: "delta"
  partition_by: "ingestion_date"

governance:
  source_system: "NSE"
  pipeline_run_id: "20260428_run01"

logging:
  level: "INFO"
  format: "%(asctime)s - %(levelname)s - %(message)s"